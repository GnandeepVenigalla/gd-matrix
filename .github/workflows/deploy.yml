name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # change to 'master' if your default branch is master
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Matrix_Frontend/gd-matrix/package-lock.json

      - name: Install dependencies
        working-directory: Matrix_Frontend/gd-matrix
        run: npm ci

      - name: Build (static export)
        working-directory: Matrix_Frontend/gd-matrix
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Matrix_Frontend/gd-matrix/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
